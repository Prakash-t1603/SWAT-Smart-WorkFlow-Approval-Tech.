<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWAT - Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <script defer src="./js/darkmode.js"></script>
    <script defer src="./js/auth.js"></script>
  </head>
  <body>
    <div class="auth-wrap">
      <form id="adminLoginForm" class="auth-card glass soft-card">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-2xl font-bold">Admin Approval Login</h2>
          <button
            type="button"
            class="btn-secondary text-sm theme-icon-btn"
            data-dark-toggle
            data-theme-symbol="true"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            &#9790;
          </button>
        </div>
        <p class="text-sm text-slate-600 dark:text-slate-300 mb-5">Only approval admins can access approval chain controls.</p>
        <div class="space-y-4">
          <div>
            <label class="text-sm font-medium">Admin Email</label>
            <input class="input mt-1" type="email" name="email" required placeholder="admin@company.com" />
          </div>
          <div>
            <label class="text-sm font-medium">Password</label>
            <input class="input mt-1" type="password" name="password" required placeholder="********" />
          </div>
          <button class="btn-primary w-full" type="submit">Login as Admin</button>
        </div>
        <p class="text-sm mt-5 text-center text-slate-600 dark:text-slate-300">
          Standard user?
          <a class="text-sky-600 font-semibold" href="./login.html">Go to user login</a>
        </p>
        <p class="text-sm mt-2 text-center text-slate-600 dark:text-slate-300">
          Employee management?
          <a class="text-sky-600 font-semibold" href="./employee-admin.html" data-admin-only="true" hidden>Open employee admin</a>
        </p>
        <p id="authMessage" class="text-sm mt-4 text-center"></p>
      </form>
    </div>
  </body>
</html>
