<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWAT - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <script defer src="./js/darkmode.js"></script>
    <script defer src="./js/auth.js"></script>
  </head>
  <body>
    <div class="auth-wrap">
      <div class="auth-card glass soft-card">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-2xl font-bold">Reset Password</h2>
          <button
            type="button"
            class="btn-secondary text-sm theme-icon-btn"
            data-dark-toggle
            data-theme-symbol="true"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            &#9790;
          </button>
        </div>
        <p class="text-sm text-slate-600 dark:text-slate-300 mb-5">Change password directly with old password, or use OTP reset.</p>
        <div class="space-y-3">
          <div>
            <label class="text-sm font-medium">Employee Email</label>
            <input class="input mt-1" type="email" id="otpEmail" placeholder="you@company.com" />
          </div>
          <div>
            <label class="text-sm font-medium">Old Password (if known)</label>
            <input class="input mt-1" type="password" id="oldPassword" placeholder="Current password" />
          </div>
          <div>
            <label class="text-sm font-medium">New Password</label>
            <input class="input mt-1" type="password" id="otpNewPassword" placeholder="Enter new password" />
          </div>
          <button class="btn-primary w-full" type="button" id="changePasswordBtn">Change Password (Old Password)</button>
          <div class="text-center text-xs text-slate-500 dark:text-slate-400">or use OTP</div>
          <button class="btn-secondary w-full" type="button" id="requestOtpBtn">Request OTP</button>
          <div>
            <label class="text-sm font-medium">OTP Code</label>
            <input class="input mt-1" type="text" id="otpCode" placeholder="Enter 6-digit OTP" />
          </div>
          <button class="btn-primary w-full" type="button" id="verifyOtpBtn">Verify OTP and Reset Password</button>
        </div>
        <p class="text-sm mt-4 text-center text-slate-600 dark:text-slate-300">
          Back to login?
          <a class="text-sky-600 font-semibold" href="./login.html">Go to login</a>
        </p>
        <p id="authMessage" class="text-sm mt-4 text-center"></p>
      </div>
    </div>
  </body>
</html>
