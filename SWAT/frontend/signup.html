<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWAT - Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <script defer src="./js/darkmode.js"></script>
    <script defer src="./js/auth.js"></script>
  </head>
  <body>
    <div class="auth-wrap">
      <form id="signupForm" class="auth-card glass soft-card">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-2xl font-bold">Create Account</h2>
          <button
            type="button"
            class="btn-secondary text-sm theme-icon-btn"
            data-dark-toggle
            data-theme-symbol="true"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            &#9790;
          </button>
        </div>
        <p class="text-sm text-slate-600 dark:text-slate-300 mb-5">Start your SmartFlow workspace.</p>
        <div class="space-y-4">
          <div>
            <label class="text-sm font-medium">Name</label>
            <input class="input mt-1" type="text" name="name" required placeholder="Jane Doe" />
          </div>
          <div>
            <label class="text-sm font-medium">Email</label>
            <input class="input mt-1" type="email" name="email" required placeholder="you@company.com" />
          </div>
          <div>
            <label class="text-sm font-medium">Password</label>
            <input class="input mt-1" type="password" name="password" required placeholder="Min 8 characters" />
          </div>
          <button class="btn-primary w-full" type="submit">Create Account</button>
        </div>
        <p class="text-sm mt-5 text-center text-slate-600 dark:text-slate-300">
          Already have an account?
          <a class="text-sky-600 font-semibold" href="./login.html">Back to login</a>
        </p>
        <p id="authMessage" class="text-sm mt-4 text-center"></p>
      </form>
    </div>
  </body>
</html>
