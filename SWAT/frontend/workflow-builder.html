<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartFlow - Workflow Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/workflow-builder.css" />
    <script defer src="./js/darkmode.js"></script>
    <script defer src="./js/realtime.js"></script>
    <script defer src="./js/workflow-canvas.js"></script>
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="h-full overflow-hidden bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div class="flex h-full w-full">
      <!-- Mini Sidebar -->
      <aside class="w-16 flex flex-col items-center py-6 gap-6 glass border-r z-50">
        <div class="w-10 h-10 bg-gradient-to-tr from-sky-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl mb-4">
          S
        </div>
        <nav class="flex flex-col gap-4">
          <a href="dashboard.html" class="p-3 rounded-xl hover:bg-sky-500/10 text-slate-400 hover:text-sky-500 transition-colors" title="Dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          </a>
          <a href="workflows.html" class="p-3 rounded-xl hover:bg-sky-500/10 text-slate-400 hover:text-sky-500 transition-colors" title="Workflows">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11v8a2 2 0 0 1-2 2H3"/><path d="M19 11v8a2 2 0 0 0 2 2h2"/><rect x="8" y="2" width="8" height="8" rx="2"/><path d="M12 10v4"/><path d="m9 14 3 3 3-3"/></svg>
          </a>
          <a href="#" class="p-3 rounded-xl bg-sky-500/20 text-sky-500" title="Workflow Builder">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </a>
          <a href="approvals.html" class="p-3 rounded-xl hover:bg-sky-500/10 text-slate-400 hover:text-sky-500 transition-colors" title="Requests">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </a>
        </nav>
        <div class="mt-auto flex flex-col gap-4">
          <button data-dark-toggle class="p-3 rounded-xl hover:bg-slate-500/10 text-slate-400 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col min-w-0 relative">
        <!-- Topbar -->
        <header class="h-16 glass border-b flex items-center justify-between px-6 z-40">
          <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold tracking-tight outline-none focus:ring-2 focus:ring-sky-500 rounded px-2 py-1" id="workflow-title" contenteditable="true">Untitled Workflow</h1>
            <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase bg-sky-500/10 text-sky-500 border border-sky-500/20">Draft</span>
          </div>
          <div class="flex items-center gap-3">
            <button id="execute-btn" class="btn-primary py-2 px-4 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              <span>Execute</span>
            </button>
            <button id="save-btn" class="btn-secondary py-2 px-4 border-slate-300 dark:border-slate-700">Save</button>
            <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 border border-slate-300 dark:border-slate-700"></div>
          </div>
        </header>

        <!-- Canvas Body -->
        <div class="flex-1 flex relative overflow-hidden">
          <!-- Node Menu -->
          <div class="w-64 glass border-r flex flex-col z-30 p-4 hide-scrollbar overflow-y-auto">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Triggers</h3>
            <div class="grid gap-2 mb-6">
              <div class="sidebar-node-item" draggable="true" data-type="start">
                <div class="node-icon bg-emerald-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </div>
                <span class="text-sm font-semibold">Start</span>
              </div>
              <div class="sidebar-node-item" draggable="true" data-type="webhook">
                <div class="node-icon bg-blue-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </div>
                <span class="text-sm font-semibold">Webhook</span>
              </div>
            </div>

            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Logic</h3>
            <div class="grid gap-2 mb-6">
              <div class="sidebar-node-item" draggable="true" data-type="condition">
                <div class="node-icon bg-amber-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-9 9 9 9 9-9-9-9Z"/></svg>
                </div>
                <span class="text-sm font-semibold">Condition</span>
              </div>
            </div>

            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Actions</h3>
            <div class="grid gap-2">
              <div class="sidebar-node-item" draggable="true" data-type="email">
                <div class="node-icon bg-sky-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
                <span class="text-sm font-semibold">Send Email</span>
              </div>
              <div class="sidebar-node-item" draggable="true" data-type="approval">
                <div class="node-icon bg-indigo-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                </div>
                <span class="text-sm font-semibold">Approval</span>
              </div>
              <div class="sidebar-node-item" draggable="true" data-type="api">
                <div class="node-icon bg-rose-500">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </div>
                <span class="text-sm font-semibold">API Call</span>
              </div>
            </div>
          </div>

          <!-- The Canvas -->
          <div class="flex-1 relative workflow-canvas-container" id="canvas-container">
            <div id="workflow-canvas">
              <svg id="connections-layer">
                <defs>
                  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orientation="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
                  </marker>
                </defs>
              </svg>
              <!-- Nodes will be injected here -->
            </div>
          </div>

          <!-- Properties Panel -->
          <div class="w-80 glass border-l z-30 p-6 flex flex-col transform translate-x-full panel-transition overflow-y-auto" id="properties-panel">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-lg font-bold">Node Settings</h2>
              <button id="close-panel" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
            <div id="property-form-container" class="space-y-4">
              <!-- Dynamic Form -->
              <p class="text-sm text-slate-400 italic">Select a node to configure it.</p>
            </div>
            <div class="mt-auto pt-6 border-t border-slate-200 dark:border-slate-800">
              <button id="delete-node-btn" class="w-full py-2 px-4 rounded-xl border border-rose-500/50 text-rose-500 hover:bg-rose-500/10 font-semibold transition-colors">
                Delete Node
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Execution Status Overlay -->
    <div id="execution-overlay" class="fixed bottom-6 right-6 w-80 glass rounded-2xl p-4 shadow-2xl border border-sky-500/30 transform translate-y-[150%] transition-transform z-50">
      <div class="flex items-center justify-between mb-3">
        <h4 class="font-bold text-sm flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
          Execution Status
        </h4>
        <button id="close-execution" class="text-slate-400 hover:text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="space-y-2 text-xs" id="execution-logs">
        <div class="flex justify-between">
          <span class="text-slate-400">Workflow Started</span>
          <span class="font-mono">10:45:22</span>
        </div>
      </div>
    </div>
  </body>
</html>
